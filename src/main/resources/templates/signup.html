<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SmartOnboard - Signup</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0f0f1a;
            display:flex; align-items:center; justify-content:center; height:100vh; }
        .card { background:#1a1a2e; padding:40px; border-radius:16px;
            box-shadow:0 4px 24px rgba(0,0,0,0.4); width:400px; }
        .logo { font-size:24px; font-weight:700; color:#a78bfa; text-align:center; margin-bottom:8px; }
        .subtitle { text-align:center; color:#6b7280; font-size:14px; margin-bottom:32px; }
        label { display:block; font-size:13px; font-weight:600; color:#a0aec0; margin-bottom:6px; }
        input, select { width:100%; padding:12px; background:#0f0f1a; border:1.5px solid #2d2d44;
            border-radius:8px; font-size:14px; outline:none; color:white; margin-bottom:16px; }
        input:focus, select:focus { border-color:#a78bfa; }
        button { width:100%; padding:13px; background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; border:none; border-radius:8px; font-size:15px;
            font-weight:600; cursor:pointer; margin-top:8px; }
        .login-link { text-align:center; margin-top:16px; color:#6b7280; font-size:13px; }
        .login-link a { color:#a78bfa; text-decoration:none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🚀 SmartOnboard</div>
    <div class="subtitle">Create your account</div>
    <form th:action="@{/signup}" method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required/>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required/>
        <label>Role</label>
        <select name="role">
            <option value="ROLE_HR">HR Manager</option>
            <option value="ROLE_EMPLOYEE">Employee</option>
        </select>
        <button type="submit">Create Account</button>
    </form>
    <div class="login-link">
        Already have an account? <a href="/login">Sign In</a>
    </div>
</div>
</body>
</html>
